<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroStory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background:#0f172a; color:#e2e8f0; font-family:sans-serif; }
    .loader { border:3px solid #333; border-top:3px solid #fbbf24; border-radius:50%; width:24px; height:24px; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .typing::after { content:'|'; animation:blink 1s infinite; }
    @keyframes blink { 50% { opacity:0; } }
    .audio-wave { display:flex; gap:2px; align-items:center; height:20px; }
    .audio-wave span { width:3px; background:#fbbf24; border-radius:2px; animation:wave 1s ease-in-out infinite; }
    .audio-wave span:nth-child(2){ animation-delay:0.1s; height:12px; }
    .audio-wave span:nth-child(3){ animation-delay:0.2s; height:16px; }
    .audio-wave span:nth-child(4){ animation-delay:0.3s; height:10px; }
    .audio-wave span:nth-child(5){ animation-delay:0.4s; height:14px; }
    @keyframes wave { 0%,100%{ transform:scaleY(1); } 50%{ transform:scaleY(1.8); } }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
  <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center">
    <div>
      <h1 class="font-bold text-xl"><i class="fa-solid fa-brain mr-2"></i>NeuroStory</h1>
      <p id="status" class="text-xs text-green-400">AI активен</p>
    </div>
    <div class="flex items-center gap-3">
      <button id="musicToggle" class="px-3 py-1.5 rounded bg-slate-700 hover:bg-slate-600 transition flex items-center gap-2 text-sm">
        <i class="fa-solid fa-music"></i>
        <span id="musicStatus">🎵 Музыка</span>
      </button>
      <button onclick="restart()" class="text-gray-300 hover:text-white p-2">
        <i class="fa-solid fa-rotate-right"></i>
      </button>
    </div>
  </header>

  <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
    <section class="lg:w-2/3 bg-black flex flex-col justify-center items-center p-4">
      <div class="relative w-full max-w-2xl aspect-video bg-slate-900 rounded overflow-hidden border border-slate-700">
        <img id="img" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" />
        <div id="imgLoader" class="absolute inset-0 flex items-center justify-center bg-black/80">
          <div class="loader"></div>
        </div>
      </div>
    </section>

    <section class="lg:w-1/3 flex flex-col bg-slate-900 border-l border-slate-800">
      <div id="story" class="flex-1 p-4 overflow-y-auto"></div>
      <div id="choices" class="p-4 bg-slate-800 border-t border-slate-700 space-y-2"></div>
      
      <!-- 🎵 Аудио панель -->
      <div id="audioPanel" class="p-3 bg-slate-800/50 border-t border-slate-700 hidden">
        <div class="flex items-center gap-3">
          <button id="playPauseBtn" class="p-2 rounded-full bg-slate-700 hover:bg-slate-600 transition">
            <i class="fa-solid fa-play" id="playIcon"></i>
          </button>
          <div class="flex-1">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.7" class="w-full accent-fbbf24">
          </div>
          <span class="text-xs text-gray-400" id="musicInfo">—</span>
        </div>
        <p id="musicPromptDisplay" class="text-xs text-gray-500 mt-1 truncate"></p>
      </div>
    </section>
  </main>

  <script>
    const API_BASE_URL = "https://story-axss.onrender.com";
    const storyDiv = document.getElementById("story");
    const choicesDiv = document.getElementById("choices");
    const img = document.getElementById("img");
    const imgLoader = document.getElementById("imgLoader");
    const musicToggle = document.getElementById("musicToggle");
    const musicStatus = document.getElementById("musicStatus");
    const audioPanel = document.getElementById("audioPanel");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const playIcon = document.getElementById("playIcon");
    const volumeSlider = document.getElementById("volumeSlider");
    const musicInfo = document.getElementById("musicInfo");
    const musicPromptDisplay = document.getElementById("musicPromptDisplay");
    
    let currentText = "Вы открываете глаза в неоновом переулке. В кармане что-то вибрирует.";
    let currentImagePrompt = "Cyberpunk alleyway, neon lights, purple fog, cinematic lighting";
    let currentMusicPrompt = "dark cyberpunk ambient, slow tempo, synthesizer";
    let isMusicPlaying = false;
    
    // 🎵 ГЕНЕРАТОР МУЗЫКИ В БРАУЗЕРЕ (Tone.js)
    let synth, loop, reverb, delay;
    let isInitialized = false;
    let currentParams = null;

    // 🔤 Текст
    async function typeText(text) {
      return new Promise(resolve => {
        const p = document.createElement("p");
        p.className = "text-lg leading-relaxed typing text-gray-300";
        storyDiv.appendChild(p);
        let i = 0;
        const tick = () => {
          if (i < text.length) {
            p.textContent += text[i++];
            storyDiv.scrollTop = storyDiv.scrollHeight;
            setTimeout(tick, 25);
          } else {
            p.classList.remove("typing");
            resolve();
          }
        };
        tick();
      });
    }

    // 🖼️ Изображение
    async function loadImage(prompt) {
      imgLoader.classList.remove("hidden");
      img.classList.add("opacity-0");

      try {
        const r = await fetch(`${API_BASE_URL}/api/image`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        if (!r.ok) throw new Error("Image API error");
        const data = await r.json();
        img.src = data.imageUrl.startsWith('data:') ? data.imageUrl : `data:${data.imageUrl}`;
        
        img.onload = () => {
          img.classList.remove("opacity-0");
          imgLoader.classList.add("hidden");
        };
      } catch (e) {
        console.error("Image error:", e);
        img.src = `https://picsum.photos/seed/${encodeURIComponent(prompt)}/800/450`;
        imgLoader.classList.add("hidden");
      }
    }

    // 🎵 Инициализация аудио
    async function initAudio() {
      if (isInitialized) return true;
      
      try {
        await Tone.start();
        
        reverb = new Tone.Reverb({ decay: 3, wet: 0.4 }).toDestination();
        delay = new Tone.FeedbackDelay({ delayTime: "8n", feedback: 0.3, wet: 0.3 }).connect(reverb);
        
        isInitialized = true;
        console.log("✅ Audio initialized");
        return true;
      } catch (err) {
        console.error("❌ Audio init failed:", err);
        return false;
      }
    }

    // 🎵 Генерация музыки (БЕЗ СЕРВЕРА!)
    async function generateBrowserMusic(prompt) {
      if (!await initAudio()) {
        throw new Error("Не удалось инициализировать аудио. Кликните по странице и попробуйте снова.");
      }

      // Остановка предыдущей
      stopMusic();

      // Парсинг промпта
      const p = prompt.toLowerCase();
      let tempo = 70;
      let scale = [0, 3, 5, 7, 10]; // minor pentatonic
      let waveType = "sawtooth";
      
      if (p.includes("calm") || p.includes("peaceful")) {
        tempo = 60; scale = [0, 4, 7, 11]; waveType = "sine";
      } else if (p.includes("tense") || p.includes("action")) {
        tempo = 110; scale = [0, 1, 6, 7]; waveType = "sawtooth";
      } else if (p.includes("cyberpunk") || p.includes("dark") || p.includes("neon")) {
        tempo = 75; scale = [0, 2, 3, 6, 7, 8, 11]; waveType = "sawtooth";
      }

      currentParams = { tempo, scale, waveType, prompt };

      // Синтезатор
      synth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: waveType },
        envelope: { attack: 0.1, decay: 0.3, sustain: 0.4, release: 0.8 }
      }).connect(delay);
      
      synth.volume.value = -12;

      // Генерация мелодии
      const rootNote = 48; // C3
      const notes = [];
      
      for (let i = 0; i < 32; i++) {
        const interval = scale[Math.floor(Math.random() * scale.length)];
        const octave = Math.floor(Math.random() * 2) * 12;
        notes.push({
          note: rootNote + interval + octave,
          duration: Math.random() > 0.7 ? "4n" : "8n",
          time: i * 0.5
        });
      }

      // Запуск
      Tone.Transport.bpm.value = tempo;
      let noteIndex = 0;

      loop = new Tone.Loop((time) => {
        if (noteIndex >= notes.length) noteIndex = 0;
        const note = notes[noteIndex];
        synth.triggerAttackRelease(Tone.Frequency(note.note).toNote(), note.duration, time);
        noteIndex++;
      }, "8n").start(0);

      Tone.Transport.start();
      isMusicPlaying = true;

      return { tempo, duration: "continuous" };
    }

    // 🎵 Остановка
    function stopMusic() {
      if (loop) {
        loop.stop();
        loop.dispose();
        loop = null;
      }
      if (synth) {
        synth.releaseAll();
        synth = null;
      }
      Tone.Transport.stop();
      Tone.Transport.cancel();
      isMusicPlaying = false;
    }

    // 🎵 Play/Pause
    function togglePlayPause() {
      if (!isInitialized) {
        handleMusicToggle();
        return;
      }
      
      if (Tone.Transport.state === "started") {
        Tone.Transport.pause();
        isMusicPlaying = false;
      } else if (Tone.Transport.state === "paused" || isMusicPlaying) {
        Tone.Transport.start();
        isMusicPlaying = true;
      }
      updateMusicUI();
    }

    // 🎵 UI
    function updateMusicUI() {
      playIcon.className = isMusicPlaying ? 'fa-solid fa-pause' : 'fa-solid fa-play';
      musicToggle.classList.toggle('opacity-70', !isMusicPlaying);
    }

    // 🎵 Обработчик кнопки
    async function handleMusicToggle() {
      musicToggle.disabled = true;
      musicStatus.textContent = "⏳ Генерация...";
      
      try {
        await generateBrowserMusic(currentMusicPrompt);
        
        audioPanel.classList.remove("hidden");
        musicInfo.textContent = `${currentParams?.tempo || 70} BPM • Browser Synth`;
        musicPromptDisplay.textContent = currentMusicPrompt;
        musicStatus.textContent = "🎵 Играет";
        updateMusicUI();
        
      } catch (err) {
        console.error("Music error:", err);
        alert("❌ Ошибка музыки:\n" + err.message);
        musicStatus.textContent = "🎵 Ошибка";
      } finally {
        musicToggle.disabled = false;
      }
    }

    // 🎬 Сцена
    async function loadScene(choice = "") {
      choicesDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loader"></div></div>';
      storyDiv.innerHTML = "";
      musicStatus.textContent = "🎵 Музыка";

      if (choice) {
        try {
          const r = await fetch(`${API_BASE_URL}/api/story`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ currentText, choice })
          });

          const data = await r.json();
          currentText = data.text || currentText;
          currentImagePrompt = data.imagePrompt || currentImagePrompt;
          currentMusicPrompt = data.musicPrompt || currentMusicPrompt;
          
          await Promise.all([loadImage(currentImagePrompt)]);
          await typeText(currentText);
          renderChoices(data.choices || []);
          
          if (data.musicPrompt) {
            musicPromptDisplay.textContent = `🎼 ${data.musicPrompt}`;
          }
          
        } catch (err) {
          console.error("Scene error:", err);
          storyDiv.innerHTML = "<p class='text-red-400'>Ошибка. Попробуйте ещё раз.</p>";
          renderChoices([{ text: "↻ Повторить", next: choice }]);
        }
      } else {
        await loadImage(currentImagePrompt);
        await typeText(currentText);
        renderChoices([
          { text: "Достать устройство", next: "достать устройство" },
          { text: "Осмотреться", next: "осмотреться" },
          { text: "Пойти вперёд", next: "пойти вперёд" }
        ]);
      }
    }

    function renderChoices(items) {
      choicesDiv.innerHTML = "";
      items.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "w-full text-left p-3 rounded bg-slate-700 hover:bg-slate-600 transition";
        btn.textContent = c.text;
        btn.onclick = () => loadScene(c.text);
        choicesDiv.appendChild(btn);
      });
    }

    function restart() {
      stopMusic();
      currentText = "Вы открываете глаза в неоновом переулке. В кармане что-то вибрирует.";
      currentImagePrompt = "Cyberpunk alleyway, neon lights, purple fog, cinematic lighting";
      currentMusicPrompt = "dark cyberpunk ambient, slow tempo, synthesizer";
      
      audioPanel.classList.add("hidden");
      isMusicPlaying = false;
      musicStatus.textContent = "🎵 Музыка";
      updateMusicUI();
      
      storyDiv.innerHTML = "";
      choicesDiv.innerHTML = "";
      img.classList.add("opacity-0");
      
      loadScene();
    }

    // Event listeners
    volumeSlider.addEventListener('input', (e) => {
      if (synth) synth.volume.rampTo(Tone.gainToDb(parseFloat(e.target.value)), 0.1);
    });
    
    playPauseBtn.addEventListener('click', togglePlayPause);
    musicToggle.addEventListener('click', handleMusicToggle);

    // Start
    loadScene();
  </script>
</body>
</html>
