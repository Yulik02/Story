<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuroStory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: sans-serif;
    }

    .loader {
      border: 3px solid #333;
      border-top: 3px solid #fbbf24;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .typing::after {
      content: '|';
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* 🎵 Музыкальные стили */
    .audio-wave {
      display: flex;
      gap: 2px;
      align-items: center;
      height: 20px;
    }

    .audio-wave span {
      width: 3px;
      background: #fbbf24;
      border-radius: 2px;
      animation: wave 1s ease-in-out infinite;
    }

    .audio-wave span:nth-child(2) {
      animation-delay: 0.1s;
      height: 12px;
    }

    .audio-wave span:nth-child(3) {
      animation-delay: 0.2s;
      height: 16px;
    }

    .audio-wave span:nth-child(4) {
      animation-delay: 0.3s;
      height: 10px;
    }

    .audio-wave span:nth-child(5) {
      animation-delay: 0.4s;
      height: 14px;
    }

    @keyframes wave {

      0%,
      100% {
        transform: scaleY(1);
      }

      50% {
        transform: scaleY(1.8);
      }
    }

    .music-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .music-playing .audio-wave span {
      animation-play-state: running;
    }

    .music-paused .audio-wave span {
      animation-play-state: paused;
    }
  </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">
  <header class="bg-slate-800 border-b border-slate-700 px-6 py-4 flex justify-between items-center">
    <div>
      <h1 class="font-bold text-xl"><i class="fa-solid fa-brain mr-2"></i>NeuroStory</h1>
      <p id="status" class="text-xs text-green-400">AI активен</p>
    </div>
    <div class="flex items-center gap-3">
      <!-- 🎵 Кнопка управления музыкой -->
      <button id="musicToggle"
        class="music-btn px-3 py-1.5 rounded bg-slate-700 hover:bg-slate-600 transition flex items-center gap-2 text-sm"
        title="Сгенерировать/воспроизвести музыку">
        <i class="fa-solid fa-music"></i>
        <span id="musicStatus">🎵 Музыка</span>
      </button>
      <button onclick="restart()" class="text-gray-300 hover:text-white p-2" title="Начать заново">
        <i class="fa-solid fa-rotate-right"></i>
      </button>
    </div>
  </header>

  <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
    <!-- Изображение -->
    <section class="lg:w-2/3 bg-black flex flex-col justify-center items-center p-4">
      <div class="relative w-full max-w-2xl aspect-video bg-slate-900 rounded overflow-hidden border border-slate-700">
        <img id="img" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" />
        <div id="imgLoader" class="absolute inset-0 flex items-center justify-center bg-black/80">
          <div class="loader"></div>
        </div>
        <!-- 🎵 Индикатор генерации музыки -->
        <div id="musicLoader"
          class="absolute bottom-3 right-3 bg-slate-800/90 px-3 py-1.5 rounded-full text-xs flex items-center gap-2 hidden">
          <div class="audio-wave">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <span id="musicLoaderText">Генерация...</span>
        </div>
      </div>
    </section>

    <!-- Текст и выбор -->
    <section class="lg:w-1/3 flex flex-col bg-slate-900 border-l border-slate-800">
      <div id="story" class="flex-1 p-4 overflow-y-auto"></div>
      <div id="choices" class="p-4 bg-slate-800 border-t border-slate-700 space-y-2"></div>

      <!-- 🎵 Панель управления аудио -->
      <div id="audioPanel" class="p-3 bg-slate-800/50 border-t border-slate-700 hidden">
        <div class="flex items-center gap-3">
          <button id="playPauseBtn" class="p-2 rounded-full bg-slate-700 hover:bg-slate-600 transition">
            <i class="fa-solid fa-play" id="playIcon"></i>
          </button>
          <div class="flex-1">
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.7" class="w-full accent-fbbf24">
          </div>
          <span class="text-xs text-gray-400" id="musicInfo">—</span>
        </div>
        <p id="musicPromptDisplay" class="text-xs text-gray-500 mt-1 truncate"></p>
      </div>
    </section>
  </main>

  <script>
    const API_BASE_URL = "https://story-axss.onrender.com";
    const storyDiv = document.getElementById("story");
    const choicesDiv = document.getElementById("choices");
    const img = document.getElementById("img");
    const imgLoader = document.getElementById("imgLoader");
    const musicLoader = document.getElementById("musicLoader");
    const musicLoaderText = document.getElementById("musicLoaderText");
    const musicToggle = document.getElementById("musicToggle");
    const musicStatus = document.getElementById("musicStatus");
    const audioPanel = document.getElementById("audioPanel");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const playIcon = document.getElementById("playIcon");
    const volumeSlider = document.getElementById("volumeSlider");
    const musicInfo = document.getElementById("musicInfo");
    const musicPromptDisplay = document.getElementById("musicPromptDisplay");

    let currentText = "Вы открываете глаза в неоновом переулке. В кармане что-то вибрирует.";
    let currentImagePrompt = "Cyberpunk alleyway, neon lights, purple fog, cinematic lighting";
    let currentMusicPrompt = "ambient cyberpunk background, slow tempo";
    let isMusicPlaying = false;
    let musicGenerationPending = false;

    // 🎵 Глобальный объект для браузерной генерации музыки
    let browserMusic = null;

    // 🔤 Анимация текста
    async function typeText(text) {
      return new Promise(resolve => {
        const p = document.createElement("p");
        p.className = "text-lg leading-relaxed typing text-gray-300";
        storyDiv.appendChild(p);
        let i = 0;
        const tick = () => {
          if (i < text.length) {
            p.textContent += text[i++];
            storyDiv.scrollTop = storyDiv.scrollHeight;
            setTimeout(tick, 25);
          } else {
            p.classList.remove("typing");
            resolve();
          }
        };
        tick();
      });
    }

    // 🖼️ Загрузка изображения
    async function loadImage(prompt) {
      imgLoader.classList.remove("hidden");
      img.classList.add("opacity-0");

      try {
        const r = await fetch(`${API_BASE_URL}/api/image`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          console.warn("Image generation warning:", err);
          img.src = `https://picsum.photos/seed/${encodeURIComponent(prompt)}/800/450`;
        } else {
          const data = await r.json();
          // Исправлено: добавлен префикс data: для base64
          console.log(JSON.parse(window.atob(data.imageUrl.split(",")[1])).data[0]["b64_json"])
          
          const base64Payload = JSON.parse(window.atob(data.imageUrl.split(",")[1])).data[0]["b64_json"]
          // const prefix = base64Payload.startsWith('data:') ? '' : 'data:';
          console.log(base64Payload);
          
          img.src = `data:image/png;base64,${base64Payload}`;
        }

        img.onload = () => {
          img.classList.remove("opacity-0");
          imgLoader.classList.add("hidden");
        };
        img.onerror = () => {
          imgLoader.classList.add("hidden");
          console.error("Failed to load image");
        };
      } catch (e) {
        console.error("Image fetch error:", e);
        imgLoader.classList.add("hidden");
      }
    }

    // 🎵 БРАУЗЕРНЫЙ ГЕНЕРАТОР МУЗЫКИ (Web Audio API + Tone.js)
    class BrowserMusicGenerator {
      constructor() {
        this.synth = null;
        this.reverb = null;
        this.delay = null;
        this.isInitialized = false;
        this.isPlaying = false;
        this.currentPrompt = "";
      }

      // Инициализация аудио-контекста (требует жеста пользователя)
      async init() {
        if (this.isInitialized) return true;

        try {
          await Tone.start();
          console.log("🔊 Audio context initialized");

          // Создаём эффекты
          this.reverb = new Tone.Reverb({ decay: 4, wet: 0.3 }).toDestination();
          this.delay = new Tone.FeedbackDelay({ delayTime: "8n", feedback: 0.3, wet: 0.2 }).connect(this.reverb);

          this.isInitialized = true;
          return true;
        } catch (err) {
          console.error("❌ Failed to init audio:", err);
          return false;
        }
      }

      // Парсинг промпта для извлечения параметров
      parsePrompt(prompt) {
        const p = prompt.toLowerCase();

        // Настроение → темп и тональность
        let tempo = 80;
        let rootNote = "C3";
        let scale = "minor";
        let mood = "ambient";

        if (p.includes("fast") || p.includes("tense") || p.includes("action")) {
          tempo = 120; scale = "phrygian"; mood = "tense";
        } else if (p.includes("calm") || p.includes("peaceful") || p.includes("reflective")) {
          tempo = 60; scale = "major"; mood = "calm";
        } else if (p.includes("dark") || p.includes("cyberpunk") || p.includes("neon")) {
          tempo = 70; rootNote = "D#3"; scale = "minor"; mood = "dark";
        }

        // Инструменты
        const instruments = [];
        if (p.includes("synth") || p.includes("electronic")) instruments.push("synth");
        if (p.includes("piano") || p.includes("keys")) instruments.push("piano");
        if (p.includes("bass")) instruments.push("bass");
        if (p.includes("drone") || p.includes("ambient")) instruments.push("drone");
        if (instruments.length === 0) instruments.push("synth", "drone");

        return { tempo, rootNote, scale, mood, instruments };
      }

      // Генерация последовательности нот
      generateSequence(params, length = 16) {
        const scales = {
          minor: [0, 2, 3, 5, 7, 8, 10],
          major: [0, 2, 4, 5, 7, 9, 11],
          phrygian: [0, 1, 4, 5, 7, 8, 10],
          dorian: [0, 2, 3, 5, 7, 9, 10]
        };
        const scale = scales[params.scale] || scales.minor;
        const root = this.noteToMidi(params.rootNote);
        const seq = [];

        for (let i = 0; i < length; i++) {
          const step = scale[Math.floor(Math.random() * scale.length)];
          const octave = Math.random() > 0.7 ? 1 : 0;
          seq.push({
            note: this.midiToNote(root + step + octave * 12),
            duration: Math.random() > 0.8 ? "4n" : "8n",
            velocity: 0.3 + Math.random() * 0.4
          });
        }
        return seq;
      }

      noteToMidi(note) {
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const match = note.match(/^([A-G]#?)(\d)$/);
        if (!match) return 60;
        const [, name, octave] = match;
        return notes.indexOf(name) + 12 * (parseInt(octave) + 1);
      }

      midiToNote(midi) {
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const octave = Math.floor(midi / 12) - 1;
        const note = notes[midi % 12];
        return `${note}${octave}`;
      }

      // Создание синтезатора под настроение
      createSynth(params) {
        if (params.instruments.includes("piano")) {
          return new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 0.02, decay: 0.1, sustain: 0.3, release: 0.4 }
          }).connect(this.delay);
        }
        if (params.instruments.includes("bass")) {
          return new Tone.MonoSynth({
            oscillator: { type: "sawtooth" },
            filter: { Q: 2, type: "lowpass", rolloff: -24 },
            envelope: { attack: 0.01, decay: 0.2, sustain: 0.5, release: 0.3 }
          }).connect(this.reverb);
        }
        // По умолчанию — атмосферный синт
        return new Tone.PolySynth(Tone.Synth, {
          oscillator: { type: params.mood === "dark" ? "sawtooth" : "sine" },
          envelope: { attack: params.mood === "calm" ? 0.5 : 0.1, decay: 0.3, sustain: 0.4, release: params.mood === "calm" ? 1 : 0.5 }
        }).connect(this.delay);
      }

      // 🎵 Основная функция генерации и воспроизведения
      async generateAndPlay(prompt, duration = 15) {
        if (!await this.init()) {
          throw new Error("Не удалось инициализировать аудио. Нажмите на страницу и попробуйте снова.");
        }

        // Останавливаем предыдущее воспроизведение
        this.stop();

        const params = this.parsePrompt(prompt);
        this.currentPrompt = prompt;

        console.log(`🎵 Generating: ${prompt} → tempo:${params.tempo} scale:${params.scale} mood:${params.mood}`);

        // Создаём синтезатор
        this.synth = this.createSynth(params);
        this.synth.volume.value = -10;

        // Запускаем секвенсор
        const sequence = this.generateSequence(params);
        let notesPlayed = 0;
        const maxNotes = Math.floor(duration * params.tempo / 60 / 0.5); // ~2 ноты в секунду

        // Фоновый дрон для атмосферы
        if (params.instruments.includes("drone")) {
          const drone = new Tone.MembraneSynth({
            pitchDecay: 0.05, octaves: 2,
            envelope: { attack: 0.1, decay: 0.2, sustain: 0.8, release: 2 }
          }).connect(this.reverb);
          drone.triggerAttackRelease(params.rootNote, duration + 1);
        }

        // Проигрываем последовательность
        Tone.Transport.bpm.value = params.tempo;

        const loop = new Tone.Loop((time) => {
          if (notesPlayed >= maxNotes || !this.isPlaying) {
            this.stop();
            return;
          }

          const note = sequence[notesPlayed % sequence.length];
          this.synth.triggerAttackRelease(note.note, note.duration, time, note.velocity);
          notesPlayed++;
        }, "8n").start(0);

        // Запускаем транспорт
        Tone.Transport.start();
        this.isPlaying = true;

        // Авто-остановка через duration секунд
        setTimeout(() => {
          if (this.isPlaying) this.stop();
        }, duration * 1000);

        return { duration, params };
      }

      // Остановка воспроизведения
      stop() {
        if (this.synth) {
          this.synth.releaseAll();
        }
        Tone.Transport.stop();
        Tone.Transport.cancel();
        this.isPlaying = false;
      }

      // Пауза/возобновление
      togglePause() {
        if (!this.isInitialized) return;
        if (Tone.Transport.state === "started") {
          Tone.Transport.pause();
          this.isPlaying = false;
        } else if (Tone.Transport.state === "paused") {
          Tone.Transport.start();
          this.isPlaying = true;
        }
        return this.isPlaying;
      }

      // Установка громкости
      setVolume(value) {
        if (this.synth) {
          // Конвертируем 0-1 в -60..0 dB
          const db = value === 0 ? -60 : Tone.gainToDb(value);
          this.synth.volume.rampTo(db, 0.1);
        }
      }
    }

    // Инициализация генератора
    browserMusic = new BrowserMusicGenerator();

    // 🎵 Обработчики управления
    volumeSlider.addEventListener('input', (e) => {
      browserMusic?.setVolume(parseFloat(e.target.value));
    });

    playPauseBtn.addEventListener('click', () => {
      if (!browserMusic?.isInitialized) {
        handleMusicToggle();
        return;
      }
      const playing = browserMusic.togglePause();
      updateMusicUI(playing);
    });

    musicToggle.addEventListener('click', handleMusicToggle);

    // 🎵 UI обновления
    function updateMusicUI(playing) {
      isMusicPlaying = playing;
      playIcon.className = playing ? 'fa-solid fa-pause' : 'fa-solid fa-play';
      musicToggle.classList.toggle('music-playing', playing);
      musicToggle.classList.toggle('music-paused', !playing && browserMusic?.isInitialized);
    }

    function setMusicStatus(text, loading = false) {
      musicStatus.textContent = text;
      musicToggle.disabled = loading || musicGenerationPending;
      musicToggle.classList.toggle("opacity-70", loading);
    }

    // 🎵 Обработчик кнопки музыки
    async function handleMusicToggle() {
      if (musicGenerationPending) return;

      // Если уже сгенерировано и играет — пауза
      if (browserMusic?.isPlaying) {
        browserMusic.togglePause();
        updateMusicUI(false);
        return;
      }

      // Генерация новой музыки
      musicGenerationPending = true;
      musicToggle.disabled = true;
      setMusicStatus("⏳ Генерация...", true);

      try {
        musicLoader.classList.remove("hidden");
        musicLoaderText.textContent = "Синтез...";

        const result = await browserMusic.generateAndPlay(currentMusicPrompt, 15);

        // Обновляем UI
        audioPanel.classList.remove("hidden");
        musicInfo.textContent = `15с • ${result.params.mood} • ${result.params.tempo}BPM`;
        musicPromptDisplay.textContent = currentMusicPrompt;
        updateMusicUI(true);
        setMusicStatus("🎵 Играет", false);

      } catch (err) {
        console.error("Music generation error:", err);
        alert("❌ Не удалось сгенерировать музыку:\n" + (err.message || "Проверьте консоль"));
        setMusicStatus("🎵 Ошибка", false);
      } finally {
        musicLoader.classList.add("hidden");
        musicGenerationPending = false;
        musicToggle.disabled = false;
      }
    }

    // 🎬 Загрузка сцены
    async function loadScene(choice = "") {
      choicesDiv.innerHTML = '<div class="flex justify-center py-4"><div class="loader"></div></div>';
      storyDiv.innerHTML = "";
      setMusicStatus("🎵 Музыка", false);

      if (choice) {
        try {
          const r = await fetch(`${API_BASE_URL}/api/story`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ currentText, choice })
          });

          const data = await r.json();
          currentText = data.text || currentText;
          currentImagePrompt = data.imagePrompt || currentImagePrompt;
          currentMusicPrompt = data.musicPrompt || currentMusicPrompt;

          await Promise.all([
            loadImage(currentImagePrompt)
            // Браузерная музыка генерируется по запросу пользователя, не автоматически
          ]);

          await typeText(currentText);
          renderChoices(data.choices || []);

          if (data.musicPrompt) {
            musicPromptDisplay.textContent = `🎼 ${data.musicPrompt}`;
          }

        } catch (err) {
          console.error("Scene load error:", err);
          storyDiv.innerHTML = "<p class='text-red-400'>Ошибка загрузки сцены. Попробуйте ещё раз.</p>";
          renderChoices([{ text: "↻ Повторить", next: choice }]);
        }
      } else {
        // Стартовая сцена
        await loadImage(currentImagePrompt);
        await typeText(currentText);
        renderChoices([
          { text: "Достать устройство", next: "достать устройство" },
          { text: "Осмотреться", next: "осмотреться" },
          { text: "Пойти вперёд", next: "пойти вперёд" }
        ]);
      }
    }

    // 🔘 Отрисовка кнопок выбора
    function renderChoices(items) {
      choicesDiv.innerHTML = "";
      items.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "w-full text-left p-3 rounded bg-slate-700 hover:bg-slate-600 transition border border-transparent hover:border-fbbf24";
        btn.textContent = c.text;
        btn.onclick = () => loadScene(c.text);
        choicesDiv.appendChild(btn);
      });
    }

    // 🔄 Перезапуск
    function restart() {
      currentText = "Вы открываете глаза в неоновом переулке. В кармане что-то вибрирует.";
      currentImagePrompt = "Cyberpunk alleyway, neon lights, purple fog, cinematic lighting";
      currentMusicPrompt = "ambient cyberpunk background, slow tempo";

      // Сброс аудио
      browserMusic?.stop();
      audioPanel.classList.add("hidden");
      setMusicStatus("🎵 Музыка", false);
      updateMusicUI(false);

      storyDiv.innerHTML = "";
      choicesDiv.innerHTML = "";
      img.classList.add("opacity-0");

      loadScene();
    }

    // 🚀 Старт
    document.addEventListener("DOMContentLoaded", () => {
      loadScene();
    });
  </script>
</body>

</html>
